name: Python SDK Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish wheels to PyPI after building"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
          - name: macos-x86_64
            os: macos-13
          - name: linux-x86_64
            os: ubuntu-latest
          - name: windows-x86_64
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install uv
        uses: astral-sh/setup-uv@7edac99f961f18b581bbd960d59d049f04c0002f # v7.0.0
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@69d82fb0233557aec017ef13706851d0694e0f57 # v3.0.0

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build wheel
        shell: bash
        run: just --justfile crates/goose-sdk/justfile python-wheel

      - name: Smoke test wheel
        shell: bash
        run: |
          python -m venv .venv-wheel-test
          if [ "${{ runner.os }}" = "Windows" ]; then
            python_bin=".venv-wheel-test/Scripts/python.exe"
          else
            python_bin=".venv-wheel-test/bin/python"
          fi
          UV_NO_CONFIG=1 uv pip install --default-index https://pypi.org/simple --python "$python_bin" crates/goose-sdk/python/dist/*.whl
          "$python_bin" -c 'import goose; print(goose.__name__)'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@2848b2cda0e5190984587ec6bb1f36730ca78d50 # v4.6.2
        with:
          name: goose-sdk-wheel-${{ matrix.name }}
          path: crates/goose-sdk/python/dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish wheels to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    environment: pypi
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          pattern: goose-sdk-wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist
